spring.application.name=api-gateway
server.port=8080

# Registro no Eureka
eureka.client.service-url.defaultZone=${LEXO_EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${LEXO_EUREKA_HOSTNAME:localhost}

# Rotas (avaliadas em ordem). Cada prefixo /api/... vai para o microservico responsavel.
# lb:// usa o load balancer do Spring Cloud com os enderecos vindos do Eureka.
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**,/api/usuarios/**,/api/convites/**,/api/2fa/**,/api/conta/**,/api/organizacao/**,/api/perfil/**

spring.cloud.gateway.routes[1].id=cliente-service
spring.cloud.gateway.routes[1].uri=lb://cliente-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/clientes/**,/api/portal/**

spring.cloud.gateway.routes[2].id=auditoria-service
spring.cloud.gateway.routes[2].uri=lb://auditoria-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/auditoria/**

spring.cloud.gateway.routes[3].id=processo-service
spring.cloud.gateway.routes[3].uri=lb://processo-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/processos/**,/api/agenda/**,/api/cron/**

spring.cloud.gateway.routes[4].id=financeiro-service
spring.cloud.gateway.routes[4].uri=lb://financeiro-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/financeiro/**,/api/health

spring.cloud.gateway.routes[5].id=ia-service
spring.cloud.gateway.routes[5].uri=lb://ia-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/ia/**

# Segredo de assinatura do JWT — DEVE ser o mesmo dos servicos que emitem o token.
lexo.auth-secret=${AUTH_SECRET:troque-esta-chave-em-producao-com-no-minimo-32-bytes}

# Origens permitidas no CORS (frontend SPA). Vite (5173), React/Next (3000).
lexo.cors.allowed-origins=${LEXO_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Remove headers CORS duplicados (gateway + servico) — o navegador rejeita duplicados.
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

# Tracing distribuido (Micrometer -> Zipkin). Em dev, amostra 100% das requisicoes.
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${LEXO_ZIPKIN:http://localhost:9411/api/v2/spans}
# traceId/spanId nos logs para correlacionar o mesmo request entre servicos
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]
