spring.application.name=api-gateway
server.port=8080

# Registro no Eureka
eureka.client.service-url.defaultZone=${LEXO_EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${LEXO_EUREKA_HOSTNAME:localhost}

# Rotas: tudo que comeca com /api/ vai para o servico "monolito" (descoberto via Eureka).
# lb:// usa o load balancer do Spring Cloud com os enderecos vindos do Eureka.
spring.cloud.gateway.routes[0].id=monolito
spring.cloud.gateway.routes[0].uri=lb://monolito
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/**
