spring.application.name=auditoria-service
server.port=${PORT:8084}

spring.datasource.url=${LEXO_AUDITORIA_DB_URL:jdbc:postgresql://localhost:5436/lexo_auditoria}
spring.datasource.username=${LEXO_AUDITORIA_DB_USER:postgres}
spring.datasource.password=${LEXO_AUDITORIA_DB_PASS:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

eureka.client.service-url.defaultZone=${LEXO_EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${LEXO_EUREKA_HOSTNAME:localhost}

lexo.cors.allowed-origins=${LEXO_CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}

spring.kafka.bootstrap-servers=${LEXO_KAFKA_BOOTSTRAP:localhost:9094}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=app.lexo.evento
spring.kafka.consumer.properties.spring.json.value.default.type=app.lexo.evento.EventoDominio

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${LEXO_ZIPKIN:http://localhost:9411/api/v2/spans}
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]
