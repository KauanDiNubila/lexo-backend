spring.application.name=financeiro-service
server.port=${PORT:8081}

# Banco PROPRIO do financeiro-service (database-per-service) — porta 5438
spring.datasource.url=${LEXO_FINANCEIRO_DB_URL:jdbc:postgresql://localhost:5438/lexo_financeiro}
spring.datasource.username=${LEXO_FINANCEIRO_DB_USER:postgres}
spring.datasource.password=${LEXO_FINANCEIRO_DB_PASS:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Eureka
eureka.client.service-url.defaultZone=${LEXO_EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${LEXO_EUREKA_HOSTNAME:localhost}

# CORS
lexo.cors.allowed-origins=${LEXO_CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}

logging.level.org.springframework.security=INFO

# Chave de autenticacao servico-a-servico nos endpoints /internal/**
lexo.internal.api-key=${LEXO_INTERNAL_KEY:chave-interna-dev-trocar-em-producao}
