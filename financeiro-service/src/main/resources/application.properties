spring.application.name=financeiro-service
server.port=${PORT:8081}

spring.datasource.url=${LEXO_FINANCEIRO_DB_URL:jdbc:postgresql://localhost:5438/lexo_financeiro}
spring.datasource.username=${LEXO_FINANCEIRO_DB_USER:postgres}
spring.datasource.password=${LEXO_FINANCEIRO_DB_PASS:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

eureka.client.service-url.defaultZone=${LEXO_EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${LEXO_EUREKA_HOSTNAME:localhost}

lexo.cors.allowed-origins=${LEXO_CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}

logging.level.org.springframework.security=INFO

lexo.internal.api-key=${LEXO_INTERNAL_KEY:chave-interna-dev-trocar-em-producao}

spring.cloud.openfeign.client.config.default.connectTimeout=2000
spring.cloud.openfeign.client.config.default.readTimeout=2000

resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=6
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=4
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.cliente-service.base-config=default
resilience4j.circuitbreaker.instances.processo-service.base-config=default

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${LEXO_ZIPKIN:http://localhost:9411/api/v2/spans}
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]
