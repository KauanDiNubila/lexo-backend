spring.application.name=notificacao-service
server.port=${PORT:8085}

eureka.client.service-url.defaultZone=${LEXO_EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${LEXO_EUREKA_HOSTNAME:localhost}

spring.rabbitmq.host=${LEXO_RABBIT_HOST:localhost}
spring.rabbitmq.port=${LEXO_RABBIT_PORT:5673}
spring.rabbitmq.username=${LEXO_RABBIT_USER:guest}
spring.rabbitmq.password=${LEXO_RABBIT_PASS:guest}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.default-requeue-rejected=false

spring.mail.host=${LEXO_SMTP_HOST:localhost}
spring.mail.port=${LEXO_SMTP_PORT:1025}
spring.mail.properties.mail.smtp.connectiontimeout=3000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=3000
lexo.email.from=${LEXO_EMAIL_FROM:nao-responda@lexo.app}

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${LEXO_ZIPKIN:http://localhost:9411/api/v2/spans}
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]
