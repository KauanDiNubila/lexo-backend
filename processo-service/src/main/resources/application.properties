spring.application.name=processo-service
server.port=${PORT:8086}

# Banco PROPRIO do processo-service (database-per-service) — porta 5437
spring.datasource.url=${LEXO_PROCESSO_DB_URL:jdbc:postgresql://localhost:5437/lexo_processo}
spring.datasource.username=${LEXO_PROCESSO_DB_USER:postgres}
spring.datasource.password=${LEXO_PROCESSO_DB_PASS:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Eureka
eureka.client.service-url.defaultZone=${LEXO_EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${LEXO_EUREKA_HOSTNAME:localhost}

# CORS + cache
lexo.cors.allowed-origins=${LEXO_CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}
lexo.cache.ttl-minutes=${LEXO_CACHE_TTL:10}

# Redis (cache) — porta 6380
spring.data.redis.host=${LEXO_REDIS_HOST:localhost}
spring.data.redis.port=${LEXO_REDIS_PORT:6380}

# Kafka (publica eventos) — porta 9094
spring.kafka.bootstrap-servers=${LEXO_KAFKA_BOOTSTRAP:localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# RabbitMQ (enfileira lembretes de prazo) — porta 5673
spring.rabbitmq.host=${LEXO_RABBIT_HOST:localhost}
spring.rabbitmq.port=${LEXO_RABBIT_PORT:5673}
spring.rabbitmq.username=${LEXO_RABBIT_USER:guest}
spring.rabbitmq.password=${LEXO_RABBIT_PASS:guest}
