# Configuracao de teste — H2 em memoria, sem Redis/Kafka/RabbitMQ/Eureka.
spring.datasource.url=jdbc:h2:mem:processotest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

lexo.cors.allowed-origins=http://localhost:3000
lexo.cache.ttl-minutes=10

spring.cache.type=none
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.producer.properties.max.block.ms=1
spring.rabbitmq.listener.simple.auto-startup=false
eureka.client.enabled=false
