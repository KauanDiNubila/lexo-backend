spring.application.name=lexo-backend

# Banco de dados PostgreSQL (via Docker, porta 5433).
# Variaveis com prefixo LEXO_ para nao colidir com DB_USERNAME/DB_PASSWORD globais
# que possam existir na maquina (usados por outros projetos).
spring.datasource.url=${LEXO_DATABASE_URL:jdbc:postgresql://localhost:5433/lexo_dev}
spring.datasource.username=${LEXO_DB_USERNAME:postgres}
spring.datasource.password=${LEXO_DB_PASSWORD:postgres}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Servidor
server.port=${PORT:8080}

# Configuracoes do Lexo
# Chave de assinatura do JWT (HS256). Em producao, defina AUTH_SECRET com >=32 bytes.
lexo.auth-secret=${AUTH_SECRET:troque-esta-chave-em-producao-com-no-minimo-32-bytes}
# Validade do token de sessao (em minutos).
lexo.jwt-expiration-minutes=${JWT_EXP_MINUTES:720}
# Chave de cifragem dos segredos TOTP (AES-256-GCM). Cai para auth-secret se ausente.
lexo.totp-enc-key=${TOTP_ENC_KEY:}
# URL base usada nos links de convite por email.
lexo.base-url=${BASE_URL:http://localhost:8080}
# Origens permitidas no CORS (frontend). Lista separada por virgula.
# Padroes de dev: React/Next (3000), Vite (5173), Angular (4200).
lexo.cors.allowed-origins=${LEXO_CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}

# Redis (cache + rate limiting) — via Docker, porta 6380
spring.data.redis.host=${LEXO_REDIS_HOST:localhost}
spring.data.redis.port=${LEXO_REDIS_PORT:6380}
# TTL padrao das entradas de cache, em minutos
lexo.cache.ttl-minutes=${LEXO_CACHE_TTL:10}

# Kafka (eventos de dominio) — via Docker, porta 9094
spring.kafka.bootstrap-servers=${LEXO_KAFKA_BOOTSTRAP:localhost:9094}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=app.lexo.evento
spring.kafka.consumer.properties.spring.json.value.default.type=app.lexo.evento.EventoDominio

# RabbitMQ (fila de tarefas: e-mails) — via Docker, porta 5673
spring.rabbitmq.host=${LEXO_RABBIT_HOST:localhost}
spring.rabbitmq.port=${LEXO_RABBIT_PORT:5673}
spring.rabbitmq.username=${LEXO_RABBIT_USER:guest}
spring.rabbitmq.password=${LEXO_RABBIT_PASS:guest}
# Retry do consumidor: tenta 3x; ao esgotar, a mensagem vai para a dead-letter queue.
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.default-requeue-rejected=false

logging.level.org.springframework.security=INFO
