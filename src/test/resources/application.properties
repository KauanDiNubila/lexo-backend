# Configuracao usada apenas nos testes — H2 em memoria, sem Postgres/Docker.
spring.datasource.url=jdbc:h2:mem:lexotest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Propriedades do Lexo (valores de teste)
lexo.auth-secret=segredo-de-teste-com-no-minimo-32-bytes-aqui
lexo.jwt-expiration-minutes=720
lexo.totp-enc-key=
lexo.base-url=http://localhost:8080
lexo.cors.allowed-origins=http://localhost:3000
