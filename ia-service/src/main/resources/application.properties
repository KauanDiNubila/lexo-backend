spring.application.name=ia-service
server.port=${PORT:8087}

eureka.client.service-url.defaultZone=${LEXO_EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${LEXO_EUREKA_HOSTNAME:localhost}

lexo.ia.gemini.api-key=${GEMINI_API_KEY:}
lexo.ia.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
lexo.ia.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${LEXO_ZIPKIN:http://localhost:9411/api/v2/spans}
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]
