services:
  financeiro-db:
    image: postgres:16-alpine
    container_name: lexo-financeiro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lexo_financeiro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - lexo_financeirodata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lexo_financeiro"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-db:
    image: postgres:16-alpine
    container_name: lexo-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lexo_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # banco proprio do auth-service (database-per-service)
      - "5434:5432"
    volumes:
      - lexo_authdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lexo_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  cliente-db:
    image: postgres:16-alpine
    container_name: lexo-cliente-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lexo_cliente
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - lexo_clientedata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lexo_cliente"]
      interval: 5s
      timeout: 5s
      retries: 5

  auditoria-db:
    image: postgres:16-alpine
    container_name: lexo-auditoria-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lexo_auditoria
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - lexo_auditoriadata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lexo_auditoria"]
      interval: 5s
      timeout: 5s
      retries: 5

  processo-db:
    image: postgres:16-alpine
    container_name: lexo-processo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lexo_processo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - lexo_processodata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lexo_processo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lexo-redis
    restart: unless-stopped
    ports:
      # host 6380 -> container 6379 (evita conflito com outros Redis na 6379)
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.8.1
    container_name: lexo-kafka
    restart: unless-stopped
    ports:
      # host 9094 -> container 9092 (evita conflito com outros Kafka na 9092)
      - "9094:9092"
    environment:
      # KRaft (sem Zookeeper) — no single broker e tambem o controller
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # advertised na porta do host (9094) para clientes de fora do container
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: lexo-rabbit
    restart: unless-stopped
    ports:
      # host 5673 -> AMQP 5672 ; host 15673 -> painel web 15672
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  lexo_financeirodata:
  lexo_authdata:
  lexo_clientedata:
  lexo_auditoriadata:
  lexo_processodata:
