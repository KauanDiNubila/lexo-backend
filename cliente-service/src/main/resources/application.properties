spring.application.name=cliente-service
server.port=${PORT:8083}

# Banco PROPRIO do cliente-service (database-per-service) — porta 5435
spring.datasource.url=${LEXO_CLIENTE_DB_URL:jdbc:postgresql://localhost:5435/lexo_cliente}
spring.datasource.username=${LEXO_CLIENTE_DB_USER:postgres}
spring.datasource.password=${LEXO_CLIENTE_DB_PASS:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Eureka
eureka.client.service-url.defaultZone=${LEXO_EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${LEXO_EUREKA_HOSTNAME:localhost}

# CORS + cache
lexo.cors.allowed-origins=${LEXO_CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}
lexo.cache.ttl-minutes=${LEXO_CACHE_TTL:10}

# Redis (cache) — infra compartilhada, porta 6380
spring.data.redis.host=${LEXO_REDIS_HOST:localhost}
spring.data.redis.port=${LEXO_REDIS_PORT:6380}

# Kafka (eventos de dominio) — infra compartilhada, porta 9094
spring.kafka.bootstrap-servers=${LEXO_KAFKA_BOOTSTRAP:localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Chave de autenticacao servico-a-servico nos endpoints /internal/**
lexo.internal.api-key=${LEXO_INTERNAL_KEY:chave-interna-dev-trocar-em-producao}

# Tracing distribuido (Micrometer -> Zipkin). Em dev, amostra 100% das requisicoes.
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${LEXO_ZIPKIN:http://localhost:9411/api/v2/spans}
# traceId/spanId nos logs para correlacionar o mesmo request entre servicos
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]
