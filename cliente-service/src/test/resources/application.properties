spring.datasource.url=jdbc:h2:mem:clientetest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

lexo.cors.allowed-origins=http://localhost:3000
lexo.cache.ttl-minutes=10
lexo.internal.api-key=chave-de-teste-interna

spring.cache.type=none
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.producer.properties.max.block.ms=1
eureka.client.enabled=false
